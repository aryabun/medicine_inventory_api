services:
    # 1. THE WEB & API SERVER
    app: # Renamed from laravel-app
        build:
            context: .
            dockerfile: Dockerfile
        container_name: med_inventory_app
        image: med-inventory-core:latest
        pull_policy: never
        ports:
            - "80:80"
        environment:
            - DB_HOST=postgres
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy

    # 2. THE QUEUE WORKER
    worker: # Renamed from laravel-worker
        build:
            context: .
            dockerfile: Dockerfile
        container_name: worker
        image: med-inventory-core:latest
        pull_policy: never
        command: php artisan queue:work --verbose --tries=3
        environment:
            - DB_HOST=postgres
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy

    # 3. THE CRON / SCHEDULER
    scheduler: # Renamed from laravel-scheduler
        build:
            context: .
            dockerfile: Dockerfile
        container_name: cron_scheduler
        image: med-inventory-core:latest
        pull_policy: never
        command: php artisan schedule:work
        environment:
            - DB_HOST=postgres
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy

    # 4. THE POSTGRESQL DATABASE
    postgres:
        image: postgres:16-alpine
        container_name: med_inventory_db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 5s
            timeout: 3s
            retries: 20
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
